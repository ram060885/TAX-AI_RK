<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="glowingBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="60%" stop-color="#fff5f7"/>
      <stop offset="100%" stop-color="#f0f7ff"/>
    </linearGradient>

    <!-- Outer Pink-to-Blue Core Outline Gradient -->
    <linearGradient id="outlineGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#db2777"/> <!-- Pink-600 -->
      <stop offset="50%" stop-color="#8b5cf6"/> <!-- Purple-500 -->
      <stop offset="100%" stop-color="#3b82f6"/> <!-- Blue-500 -->
    </linearGradient>

    <!-- Subtle Drop Shadow -->
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="16" stdDeviation="16" flood-color="#ec4899" flood-opacity="0.12"/>
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#3b82f6" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Solid base rounded rect representing the exact Play Store shape with margins -->
  <rect x="24" y="24" width="464" height="464" rx="112" fill="url(#glowingBg)" filter="url(#softShadow)" />

  <!-- Dual outline wrapping exactly around the boundaries -->
  <rect x="24" y="24" width="464" height="464" rx="112" fill="none" stroke="url(#outlineGrad)" stroke-width="8" />

  <!-- Embedded Icon Elements -->
  <!-- Rounded Decorative Badge for Launcher Maskable Areas -->
  <g transform="translate(144, 110)">
    <!-- Shield / Document Base representation -->
    <rect x="0" y="0" width="224" height="252" rx="48" fill="#fff0f5" stroke="#fbcfe8" stroke-width="2.5" />
    <rect x="12" y="12" width="200" height="228" rx="36" fill="#f0f7ff" stroke="#bfdbfe" stroke-width="2.5" />

    <!-- Horizontal Document lines representing tax statements -->
    <rect x="40" y="60" width="144" height="12" rx="6" fill="#db2777" opacity="0.15" />
    <rect x="40" y="88" width="112" height="12" rx="6" fill="#3b82f6" opacity="0.15" />
    <rect x="40" y="116" width="144" height="12" rx="6" fill="#9333ea" opacity="0.1" />

    <!-- Rupee symbol core glyph centered professionally within the document -->
    <g transform="translate(76, 138) scale(1.15)">
      <!-- Beautiful vector Rupee glyph -->
      <!-- Draw horizontal bars of ₹ -->
      <line x1="8" y1="12" x2="48" y2="12" stroke="url(#outlineGrad)" stroke-width="8" stroke-linecap="round"/>
      <line x1="8" y1="26" x2="40" y2="26" stroke="url(#outlineGrad)" stroke-width="8" stroke-linecap="round"/>
      <!-- Curved central bowl and descending slash of ₹ -->
      <path d="M 28 12 C 48 12, 48 40, 24 40 Z" fill="none" stroke="url(#outlineGrad)" stroke-width="8" stroke-linejoin="round"/>
      <line x1="16" y1="12" x2="16" y2="64" stroke="url(#outlineGrad)" stroke-width="8" stroke-linecap="round"/>
      <line x1="20" y1="40" x2="46" y2="70" stroke="url(#outlineGrad)" stroke-width="8" stroke-linecap="round"/>
    </g>

    <!-- Tiny decorative Sparkle corresponding to the AI groundings -->
    <path d="M 180 32 L 184 44 L 196 48 L 184 52 L 180 64 L 176 52 L 164 48 L 176 44 Z" fill="#db2777" />
  </g>

  <!-- Subtle bottom caption mimicking modern interface layout -->
  <text x="256" y="440" text-anchor="middle" font-family="'Inter', system-ui, sans-serif" font-weight="900" font-size="28" fill="#1e293b" letter-spacing="4">TAX AI</text>
</svg>
